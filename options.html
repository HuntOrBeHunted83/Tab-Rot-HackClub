<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Tab Rot!</title>
    <script src="options.js"></script>
    <style>
        html {
            min-height: 5em;
            min-width: 15em;
            background: rgb(236, 86, 86);
        }
    </style>
</head>
<body>
    <h1>Tab Rot!</h1>

    <h2>Select how long the tab will remain fresh</h2>
    <select id="fresh">
        <option value="" disabled selected hidden>-- Choose from below --</option>
        <option value="120000">2 min</option>
        <option value="300000">5 min</option>
        <option value="600000">10 min</option>
    </select>

    <h2>Select how long the tab will remain infectious</h2>
    <select id="infection">
        <option value="" disabled selected hidden>-- Choose from below --</option>
        <option value="1800000">30 min</option>
        <option value="2700000">45 min</option>
        <option value="3600000">60 min</option>
    </select>

    <h2>Select how long the tab will remain in decay</h2>
    <select id="decay">
        <option value="" disabled selected hidden>-- Choose from below --</option>
        <option value="10800000">3 hours</option>
        <option value="18000000">5 hours</option>
        <option value="25200000">7 hours</option>
    </select>

    <h2>Select how long the tab will remain rotten</h2>
    <select id="rotten">
        <option value="" disabled selected hidden>-- Choose from below --</option>
        <option value="86400000">1 day</option>
        <option value="172800000">2 days</option>
        <option value="259200000">3 days</option>
    </select>

    <h2>Select how long the tab will remain in recover</h2>
    <select id="recover">
        <option value="" disabled selected hidden>-- Choose from below --</option>
        <option value="5000">5 seconds</option>
        <option value="10000">10 seconds</option>
        <option value="15000">15 seconds</option>
    </select>
</body>
</html>
